name: tic-tac-toe-game

services:
  postgres:
    image: postgres:15-alpine
    container_name: tic-tac-toe-game-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_only}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - nakama_pg_data:/var/lib/postgresql/data
      - ./backend/nakama/sql:/docker-entrypoint-initdb.d
    networks:
      - shared_runtime_net

  nakama:
    image: heroiclabs/nakama:3.25.0
    container_name: tic-tac-toe-game-nakama
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - "/nakama/nakama migrate up --database.address postgres:${POSTGRES_PASSWORD:-changeme_local_only}@postgres:5432/nakama; exec /nakama/nakama --name nakama1 --database.address postgres:${POSTGRES_PASSWORD:-changeme_local_only}@postgres:5432/nakama --config /nakama/data/local.yml"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NAKAMA_TEST_MODE: ${NAKAMA_TEST_MODE:-false}
      NAKAMA_BOT_MATCH_TIMEOUT_SECONDS: ${NAKAMA_BOT_MATCH_TIMEOUT_SECONDS:-30}
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./backend/nakama/build:/nakama/data/modules/build
      - ./backend/nakama/local.yml:/nakama/data/local.yml
    networks:
      - shared_runtime_net

volumes:
  nakama_pg_data:

networks:
  shared_runtime_net:
    driver: bridge
